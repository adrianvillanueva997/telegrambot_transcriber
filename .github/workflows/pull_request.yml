name: Build Docker image

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, closed]

jobs:
  build_docker_image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4
      - name: Build
        run: docker build -t test .
